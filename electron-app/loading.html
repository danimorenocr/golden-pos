<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GOLDEN POS - Cargando</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --primary: #2563eb;
      --accent: #10b981;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background-color: transparent;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      width: 480px;
      height: 460px;
      border-radius: 24px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      -webkit-app-region: drag; /* Allows moving the frameless window */
    }

    .logo-container {
      margin-bottom: 16px;
      position: relative;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
    }

    .loader {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      border: 4px solid rgba(37, 99, 235, 0.1);
      border-top: 4px solid var(--primary);
      border-right: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      box-shadow: 0 0 15px rgba(37, 99, 235, 0.3);
    }

    .logo-icon {
      position: absolute;
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 40%, #94a3b8 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .status-box {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: rgba(16, 185, 129, 0.1);
      padding: 6px 16px;
      border-radius: 99px;
      border: 1px solid rgba(16, 185, 129, 0.15);
      animation: pulse 2s infinite ease-in-out;
      -webkit-app-region: no-drag;
      margin-bottom: 15px;
    }

    .terminal {
      width: 100%;
      height: 180px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 12px;
      padding: 12px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      text-align: left;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #a7f3d0;
      white-space: pre-wrap;
      word-break: break-all;
      -webkit-app-region: no-drag;
    }

    .terminal div {
      margin-bottom: 4px;
      line-height: 1.4;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.03); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <div class="loader"></div>
      <div class="logo-icon">SA</div>
    </div>
    <h1>Carnes San Agustín</h1>
    <p class="subtitle">Sistema de Inventario y Punto de Venta</p>
    <div class="status-box">Iniciando microservicios...</div>
    <div class="terminal" id="terminal-logs">Esperando arranque de Docker...
</div>
  </div>

  <script>
    const terminalLogs = document.getElementById('terminal-logs');
    const statusBox = document.querySelector('.status-box');

    if (window.dockerAPI) {
      window.dockerAPI.onDockerStatus((message) => {
        const cleanMessage = message.trim();
        if (!cleanMessage) return;

        // Limpiar el estado inicial
        if (terminalLogs.textContent.includes('Esperando arranque')) {
          terminalLogs.textContent = '';
        }

        // Crear una nueva línea de log
        const div = document.createElement('div');
        div.textContent = cleanMessage;
        terminalLogs.appendChild(div);
        
        // Auto scroll
        terminalLogs.scrollTop = terminalLogs.scrollHeight;
        
        // Actualizar etiqueta del estado
        const msgLower = cleanMessage.toLowerCase();
        if (msgLower.includes('pulling') || msgLower.includes('download')) {
          statusBox.textContent = "Descargando imágenes de Docker...";
        } else if (msgLower.includes('creating')) {
          statusBox.textContent = "Creando contenedores...";
        } else if (msgLower.includes('starting') || msgLower.includes('recreate')) {
          statusBox.textContent = "Iniciando servicios...";
        } else if (msgLower.includes('started') || msgLower.includes('healthy')) {
          statusBox.textContent = "Servicios listos.";
        }
      });

      window.dockerAPI.onDockerError((errorMessage) => {
        statusBox.textContent = "Error al iniciar Docker";
        statusBox.style.background = "rgba(239, 68, 68, 0.1)";
        statusBox.style.color = "#f87171";
        statusBox.style.border = "1px solid rgba(239, 68, 68, 0.15)";
        
        const div = document.createElement('div');
        div.style.color = "#f87171";
        div.style.fontWeight = "bold";
        div.textContent = `[ERROR] ${errorMessage}`;
        terminalLogs.appendChild(div);
        terminalLogs.scrollTop = terminalLogs.scrollHeight;
      });
    }
  </script>
</body>
</html>
