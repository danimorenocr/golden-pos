<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GOLDEN POS - Cargando</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --primary: #2563eb;
      --accent: #10b981;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background-color: transparent;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      width: 450px;
      height: 320px;
      border-radius: 24px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      -webkit-app-region: drag; /* Allows moving the frameless window */
    }

    .logo-container {
      margin-bottom: 24px;
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
    }

    .loader {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      border: 4px solid rgba(37, 99, 235, 0.1);
      border-top: 4px solid var(--primary);
      border-right: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      box-shadow: 0 0 15px rgba(37, 99, 235, 0.3);
    }

    .logo-icon {
      position: absolute;
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 40%, #94a3b8 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .status-box {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: rgba(16, 185, 129, 0.1);
      padding: 6px 16px;
      border-radius: 99px;
      border: 1px solid rgba(16, 185, 129, 0.15);
      animation: pulse 2s infinite ease-in-out;
      -webkit-app-region: no-drag;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.03); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <div class="loader"></div>
      <div class="logo-icon">SA</div>
    </div>
    <h1>Carnes San Agustín</h1>
    <p class="subtitle">Sistema de Inventario y Punto de Venta</p>
    <div class="status-box">Iniciando microservicios...</div>
  </div>
</body>
</html>
