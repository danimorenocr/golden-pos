version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: golden-postgres
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DB_USER:-microadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345678}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  consul:
    image: hashicorp/consul:1.16
    container_name: golden-consul
    restart: always
    command: agent -dev -client=0.0.0.0
    ports:
      - "8500:8500"

  ms-auth:
    image: ghcr.io/danimorenocr/ms-auth:latest
    container_name: ms-auth
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-microadmin}:${DB_PASSWORD:-12345678}@db:5432/db_agustin_auth?schema=public
      DISCOVERY_MODE: consul
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      PORT: 4002
      HOST: ms-auth
      JWT_SECRET: ${JWT_SECRET:-dev_secret_super_facil}
    depends_on:
      db:
        condition: service_healthy
      consul:
        condition: service_started

  ms-inventory:
    image: ghcr.io/danimorenocr/ms-inventory:latest
    container_name: ms-inventory
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-microadmin}:${DB_PASSWORD:-12345678}@db:5432/db_agustin_inventory?schema=public
      DISCOVERY_MODE: consul
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      PORT: 4003
      HOST: ms-inventory
      JWT_SECRET: ${JWT_SECRET:-dev_secret_super_facil}
    depends_on:
      db:
        condition: service_healthy
      consul:
        condition: service_started

  ms-sales:
    image: ghcr.io/danimorenocr/ms-sales-san-agustin:latest
    container_name: ms-sales
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-microadmin}:${DB_PASSWORD:-12345678}@db:5432/db_agustin_sales?schema=public
      DISCOVERY_MODE: consul
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      PORT: 4004
      HOST: ms-sales
      JWT_SECRET: ${JWT_SECRET:-dev_secret_super_facil}
    depends_on:
      db:
        condition: service_healthy
      consul:
        condition: service_started

  ms-reconocimiento:
    image: ghcr.io/danimorenocr/ms-reconocimiento:latest
    container_name: ms-reconocimiento
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-microadmin}:${DB_PASSWORD:-12345678}@db:5432/face_db
      DISCOVERY_MODE: consul
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      PORT: 4005
      SERVICE_HOST: ms-reconocimiento
      SERVICE_PORT: 4005
    depends_on:
      db:
        condition: service_healthy
      consul:
        condition: service_started

  ms-gateway:
    image: ghcr.io/danimorenocr/ms-gateway:latest
    container_name: ms-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    depends_on:
      consul:
        condition: service_started

  frontend:
    image: ghcr.io/danimorenocr/carnes-san-agust-n-ui:latest
    container_name: golden-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - ms-gateway

volumes:
  postgres_data:
